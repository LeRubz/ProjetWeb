<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Internhub</title>
  <link rel="stylesheet" href="layout.css" />
</head>
<body>

  <!-- HEADER -->
  <header id="header">
    <div class="navbar-container">
      <a href="#" class="logo-link">
        <img src="images/LOGO_SFB_Rognee.png" alt="Internhub Logo" class="logo" />
      </a>

      <nav class="nav-center">
        <ul id="nav-links">
          <li><a href="#" class="active">Accueil</a></li>
          <li><a href="#">Offres</a></li>
          <li><a href="#">Entreprises</a></li>
          <li><a href="#">Wishlist</a></li>
        </ul>
      </nav>

      <nav class="nav-right">
        <ul>
          <li><a href="#">Login</a></li>
          <li class="separator"></li>
          <li><a href="#">Sign in</a></li>
        </ul>
      </nav>
    </div>
    <!-- Barre violette -->
    <div class="nav-underline" id="nav-underline"></div>
  </header>

  <!-- MAIN -->
  <main class="main-content"></main>

  <!-- FOOTER -->
  <footer>
    <p>© 2025 Interhub</p>
    <nav class="footer-links">
      <a href="#">Conditions d’utilisations</a>
      <a href="#">Cookies</a>
      <a href="#">Aide et contact</a>
      <a href="#">À Propos</a>
    </nav>
    <div class="social">
      <span>Nous suivre sur :</span>
      <div class="social-icons">
        <a href="#"><img src="/images/LOGO_Facebook.png" alt="Facebook" /></a>
        <a href="#"><img src="/images/LOGO_X.png" alt="X" /></a>
        <a href="#"><img src="/images/LOGO_Tiktok.png" alt="TikTok" /></a>
        <a href="#"><img src="/images/LOGO_Instagram.png" alt="Instagram" /></a>
        <a href="#"><img src="/images/LOGO_Linkedin.png" alt="LinkedIn" /></a>
      </div>
    </div>
  </footer>

  <script>
    const underline = document.getElementById("nav-underline");
    const links = document.querySelectorAll("#nav-links a");

    function moveUnderline(el) {
      const rect = el.getBoundingClientRect();
      const headerRect = document.getElementById("header").getBoundingClientRect();
      underline.style.width = `${rect.width}px`;
      underline.style.left = `${rect.left + window.scrollX}px`;
      underline.style.top = `${headerRect.bottom + window.scrollY}px`;
    }

    links.forEach(link => {
      link.addEventListener("click", e => {
        e.preventDefault();
        links.forEach(l => l.classList.remove("active"));
        link.classList.add("active");
        moveUnderline(link);
      });
    });

    window.addEventListener("load", () => {
      const activeLink = document.querySelector("#nav-links a.active");
      if (activeLink) moveUnderline(activeLink);
    });

    window.addEventListener("resize", () => {
      const activeLink = document.querySelector("#nav-links a.active");
      if (activeLink) moveUnderline(activeLink);
    });
  </script>

</body>
</html>
